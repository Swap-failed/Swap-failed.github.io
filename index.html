<body>
  <header class="topbar">
    <a class="brand" href="dashboard/" rel="noopener noreferrer" aria-label="Swap Failed home">
      <img src="simpleswap.png" width="30" height="30" alt="">
      <span>Swap Failed</span>
    </a>

    <nav class="nav" aria-label="Authority references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/developers/docs/gas/" target="_blank" rel="nofollow noopener noreferrer">Gas docs</a>
      <a href="https://support.metamask.io/" target="_blank" rel="nofollow noopener noreferrer">MetaMask support</a>
    </nav>

    <span class="spacer" aria-hidden="true"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Swap Failed">
      <h1>Swap Failed</h1>
      <p class="value"><strong>Swap Failed</strong> helps explain why a token swap can fail before you diagnose and retry.</p>
    </section>

    <section class="app-card" aria-label="Swap retry diagnostic">
      <div class="route">
        <div class="leg">
          <span class="label">Failed swap</span>
          <span class="chip">
            <img src="btc.png" width="28" height="28" alt="BTC">
            <span>Token</span>
          </span>
        </div>

        <button class="switch" type="button" data-switch aria-label="Review swap retry direction">
          <span aria-hidden="true">&#8594;</span>
        </button>

        <div class="leg">
          <span class="label">Retry check</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="ETH">
            <span>Route</span>
          </span>
        </div>
      </div>

      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="footer">Swap Failed &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
